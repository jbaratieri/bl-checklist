<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <title>Teste especial — 7 dias grátis</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- TODO: CSS ORIGINAL COMPLETO — preservado 100% -->
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --muted: #9ca3af;
      --text: #e5e7eb;
      --primary: #2563eb;
      --accent: #10b981;
      --border: #1f2937;
      --warn: #f59e0b
    }

    * { box-sizing: border-box }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background: linear-gradient(145deg, #0b1220, #0f172a);
      color: var(--text);
      font: 16px/1.5 system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      -webkit-font-smoothing: antialiased;
      padding-top: 100px;
    }

    a { color: inherit; text-decoration: none }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 9999;
      background: rgba(15,23,42,.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      transition: height .22s ease, padding .22s ease, background .22s ease;
    }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      max-width: 1100px;
      margin: 0 auto;
      padding: 14px 24px;
    }

    .nav .logo {
      height: 72px;
      border-radius: 10px;
      padding: 6px;
      background: rgba(255,255,255,0.06);
      box-shadow: 0 6px 18px rgba(0,0,0,0.28);
    }

    .logo {
      height: 72px;
      width: auto;
      transition: height .22s ease;
    }

    .btn {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 12px;
      font-weight: 700;
      border: 1px solid transparent;
      transition: transform .05s ease, opacity .15s ease;
      font-size: 14px;
      cursor: pointer;
    }

    .btn-primary { background: var(--primary); color: #fff }
    .btn-accent  { background: var(--accent); color: #06281f }
    .btn-ghost   { background: transparent; border-color: var(--border); color: #93c5fd }
    .btn:active { transform: translateY(1px); }

    @media (max-width: 960px) {
      body { padding-top: 76px; }
      .logo { height: 56px; }
    }
    @media (max-width: 768px) {
      .logo { height: 48px; }
    }
  </style>
</head>

<body>

  <!-- HEADER com LOGO + botão trial -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="/">
        <img class="logo"
             src="https://metodobaratieri.vercel.app/assets/logos/LOGOMETBARAWHITE.png"
             alt="Método Baratieri">
      </a>

      <button class="btn btn-accent js-trial">
        🎁 Teste grátis por 7 dias — sem cartão
      </button>
    </div>
  </nav>

  <!-- Conteúdo minimalista -->
  <main class="wrap" style="text-align:center; margin-top:45px;">
    <h1>Convite especial</h1>
    <p>Ganhe acesso ao Método Baratieri por <strong>7 dias grátis</strong>!<br>
       Sem cartão. Sem compromisso. Acesso imediato.</p>

    <button class="btn btn-accent js-trial" style="margin-top:20px;">
      🎁 Gerar Teste Agora
    </button>
  </main>

  <!-- MODAL TRIAL — Completo e funcional -->
  <div id="trialModal"
       style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); align-items:center; justify-content:center; z-index:9999;">
    <div style="background:#fff; color:#111; padding:18px; border-radius:12px; max-width:420px; width:92vw; box-shadow:0 10px 30px rgba(0,0,0,.35);">
      <h3 style="margin:0 0 8px">Teste de 7 dias</h3>
      <p style="margin:0 0 10px">Digite seu e-mail para gerar seu código exclusivo.</p>

      <input id="trialEmail" type="email" placeholder="seu@email.com"
             style="width:100%; padding:10px; border:1px solid #cbd5e1; border-radius:8px;">

      <div style="margin-top:12px; display:flex; gap:8px;">
        <button id="trialSubmit" class="btn btn-primary">Gerar código</button>
        <button id="trialClose" class="btn" style="background:#e5e7eb; color:#111">Cancelar</button>
      </div>

      <div id="trialResult" style="margin-top:12px; font-size:14px;"></div>
    </div>
  </div>

  <!-- SCRIPT — Modal + fetch + botão de login -->
  <script>
    (function(){
      const modal = document.getElementById('trialModal');
      const btnsTrial = document.querySelectorAll('.js-trial');
      const btnClose = document.getElementById('trialClose');
      const btnSubmit = document.getElementById('trialSubmit');
      const inputEmail = document.getElementById('trialEmail');
      const out = document.getElementById('trialResult');

      function openModal(){
        modal.style.display='flex';
        out.textContent='';
        inputEmail.value='';
        setTimeout(()=>inputEmail.focus(), 0);
      }
      function closeModal(){ modal.style.display='none'; }

      btnsTrial.forEach(btn => btn.addEventListener('click', openModal));
      if (btnClose) btnClose.addEventListener('click', closeModal);

      if (btnSubmit) btnSubmit.addEventListener('click', async () => {
        const email = (inputEmail.value||'').trim();
        if (!email.includes('@')) {
          out.textContent='Informe um e-mail válido.'; out.style.color='red';
          return;
        }
        out.textContent='Gerando código...'; out.style.color='#333';

        try {
          const r = await fetch('/api/trial-create', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ email })
          });
          const data = await r.json();

          if (!data.ok) {
            out.textContent='Erro: '+(data.msg||'falha ao gerar'); out.style.color='red';
            return;
          }

          const code = data.code || '(verifique seu e-mail)';

          out.innerHTML = `
            <div style="padding:10px; border:1px dashed #aaa; border-radius:8px; background:#f8fafc;">
              <div style="font-size:12px; color:#475569;">Seu código de teste</div>
              <div style="font-weight:700; font-size:20px; letter-spacing:1px; color:#0f172a;">${code}</div>
            </div>

            <div style="margin-top:12px; display:flex; flex-wrap:wrap; gap:8px;">
              <button class="btn" onclick="navigator.clipboard.writeText('${code}')">Copiar código</button>

              <a class="btn btn-primary" target="_blank"
                 href="https://metodobaratieri.vercel.app/login.html">
                Abrir página de Login
              </a>
            </div>

            <div style="margin-top:8px; color:#475569; font-size:12px;">
              Válido por 7 dias a partir da primeira ativação.
            </div>
          `;
          out.style.color='#0a0';

        } catch(e){
          out.textContent='Falha de rede. Tente novamente.'; out.style.color='red';
        }
      });

      modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
      document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
    })();
  </script>

</body>
</html>
